name: Run Playwright Tests

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

concurrency:
    group: playwright-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Execute Playwright Test Suite (shard ${{ matrix.shard }}/4)
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard: [1, 2, 3, 4]
        container:
            image: mcr.microsoft.com/playwright:v1.57.0-noble
        env:
            PW_WORKERS: "50%"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: package-lock.json

            # ── Dependency install (uses npm cache keyed by package-lock.json) ────
            - name: Install npm dependencies
              run: npm ci --prefer-offline --no-audit

            # ── Tests ──────────────────────────────────────────────────────────────
            - name: Run Playwright tests
              run: npx playwright test --config=config/playwright.config.js --reporter=blob --shard=${{ matrix.shard }}/4

            # ── Artifacts ─────────────────────────────────────────────────────────
            - name: Upload blob report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-${{ matrix.shard }}
                  path: blob-report
                  if-no-files-found: warn

    merge-reports:
        name: Merge Playwright Reports
        if: ${{ !cancelled() }}
        needs: test
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.57.0-noble

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install npm dependencies
              run: npm ci --prefer-offline --no-audit

            - name: Download blob reports
              uses: actions/download-artifact@v5
              with:
                  path: all-blob-reports
                  pattern: blob-report-*
                  merge-multiple: true

            - name: Merge Playwright reports into HTML and JSON
              run: |
                  PLAYWRIGHT_HTML_OUTPUT_DIR=reports/playwright-report \
                  PLAYWRIGHT_JSON_OUTPUT_FILE=reports/test-results.json \
                  npx playwright merge-reports --reporter html,json ./all-blob-reports

            - name: Install Python metrics dependencies
              if: always() && github.ref == 'refs/heads/main'
              continue-on-error: true
              run: |
                  python3 --version
                  if ! python3 -m pip --version >/dev/null 2>&1; then
                    if command -v apt-get >/dev/null 2>&1; then
                      apt-get update
                      apt-get install -y python3-pip
                    fi
                  fi
                  python3 -m pip install --upgrade pip
                  python3 -m pip install requests python-snappy

            - name: Verify Grafana secrets are set
              if: always() && github.ref == 'refs/heads/main'
              run: |
                  if [ -z "$GRAFANA_CLOUD_URL" ]; then
                    echo "❌ GRAFANA_CLOUD_URL is empty"
                  else
                    echo "✅ GRAFANA_CLOUD_URL is set"
                  fi
                  if [ -z "$GRAFANA_CLOUD_USER" ]; then
                    echo "❌ GRAFANA_CLOUD_USER is empty"
                  else
                    echo "✅ GRAFANA_CLOUD_USER is set"
                  fi
                  if [ -z "$GRAFANA_CLOUD_TOKEN" ]; then
                    echo "❌ GRAFANA_CLOUD_TOKEN is empty"
                  else
                    echo "✅ GRAFANA_CLOUD_TOKEN is set"
                  fi
                  if [ -z "$GRAFANA_INSTANCE_URL" ]; then
                    echo "⚠️  GRAFANA_INSTANCE_URL not set — dashboard provisioning will be skipped"
                  else
                    echo "✅ GRAFANA_INSTANCE_URL is set"
                  fi
                  if [ -z "$GRAFANA_SERVICE_ACCOUNT_TOKEN" ]; then
                    echo "⚠️  GRAFANA_SERVICE_ACCOUNT_TOKEN not set — dashboard provisioning will be skipped"
                  else
                    echo "✅ GRAFANA_SERVICE_ACCOUNT_TOKEN is set"
                  fi
              env:
                  GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
                  GRAFANA_CLOUD_USER: ${{ secrets.GRAFANA_CLOUD_USER }}
                  GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
                  GRAFANA_INSTANCE_URL: ${{ secrets.GRAFANA_INSTANCE_URL }}
                  GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}

            - name: Parse merged test results and push to Grafana Cloud
              if: always() && github.ref == 'refs/heads/main'
              continue-on-error: true
              env:
                  GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
                  GRAFANA_CLOUD_USER: ${{ secrets.GRAFANA_CLOUD_USER }}
                  GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
              run: python3 .github/scripts/parse_test_metrics.py

            - name: Provision Grafana Cloud dashboard
              if: always() && github.ref == 'refs/heads/main'
              continue-on-error: true
              env:
                  GRAFANA_INSTANCE_URL: ${{ secrets.GRAFANA_INSTANCE_URL }}
                  GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
              run: python3 .github/scripts/provision_dashboard.py

            - name: Generate HTML metrics dashboard
              if: always() && github.ref == 'refs/heads/main'
              continue-on-error: true
              run: python3 .github/scripts/generate_metrics_dashboard.py

            - name: Upload merged Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-html-report
                  path: reports/playwright-report/
                  if-no-files-found: warn

            - name: Upload merged test metrics JSON
              if: always() && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: test-metrics-json
                  path: reports/test-results.json
                  if-no-files-found: warn

            - name: Upload metrics HTML dashboard
              if: always() && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: metrics-dashboard
                  path: reports/metrics-dashboard/index.html
                  if-no-files-found: warn
