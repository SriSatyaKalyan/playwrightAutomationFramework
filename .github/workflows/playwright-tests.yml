name: Run Playwright Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Execute Playwright Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # ── Dependency caching ─────────────────────────────────────────────────
      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install npm dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run Playwright tests
        continue-on-error: true
        run: npm run all

      # ── Python metrics dependencies ────────────────────────────────────────
      - name: Install Python metrics dependencies
        if: always()
        run: pip install requests python-snappy

      # ── Secret verification ────────────────────────────────────────────────
      - name: Verify Grafana secrets are set
        if: always()
        run: |
          if [ -z "$GRAFANA_CLOUD_URL" ]; then
            echo "❌ GRAFANA_CLOUD_URL is empty"
          else
            echo "✅ GRAFANA_CLOUD_URL is set"
          fi
          if [ -z "$GRAFANA_CLOUD_USER" ]; then
            echo "❌ GRAFANA_CLOUD_USER is empty"
          else
            echo "✅ GRAFANA_CLOUD_USER is set"
          fi
          if [ -z "$GRAFANA_CLOUD_TOKEN" ]; then
            echo "❌ GRAFANA_CLOUD_TOKEN is empty"
          else
            echo "✅ GRAFANA_CLOUD_TOKEN is set"
          fi
          if [ -z "$GRAFANA_INSTANCE_URL" ]; then
            echo "⚠️  GRAFANA_INSTANCE_URL not set — dashboard provisioning will be skipped"
          else
            echo "✅ GRAFANA_INSTANCE_URL is set"
          fi
          if [ -z "$GRAFANA_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "⚠️  GRAFANA_SERVICE_ACCOUNT_TOKEN not set — dashboard provisioning will be skipped"
          else
            echo "✅ GRAFANA_SERVICE_ACCOUNT_TOKEN is set"
          fi
        env:
          GRAFANA_CLOUD_URL:              ${{ secrets.GRAFANA_CLOUD_URL }}
          GRAFANA_CLOUD_USER:             ${{ secrets.GRAFANA_CLOUD_USER }}
          GRAFANA_CLOUD_TOKEN:            ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          GRAFANA_INSTANCE_URL:           ${{ secrets.GRAFANA_INSTANCE_URL }}
          GRAFANA_SERVICE_ACCOUNT_TOKEN:  ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}

      # ── Parse results & push metrics to Grafana Cloud ─────────────────────
      - name: Parse test results and push to Grafana Cloud
        if: always()
        env:
          GRAFANA_CLOUD_URL:   ${{ secrets.GRAFANA_CLOUD_URL }}
          GRAFANA_CLOUD_USER:  ${{ secrets.GRAFANA_CLOUD_USER }}
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
        run: python3 .github/scripts/parse_test_metrics.py

      # ── Provision live Grafana dashboard ──────────────────────────────────
      - name: Provision Grafana Cloud dashboard
        if: always()
        env:
          GRAFANA_INSTANCE_URL:          ${{ secrets.GRAFANA_INSTANCE_URL }}
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: python3 .github/scripts/provision_dashboard.py

      # ── Generate local HTML artifact dashboard ────────────────────────────
      - name: Generate HTML metrics dashboard
        if: always()
        run: python3 .github/scripts/generate_metrics_dashboard.py

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/
          if-no-files-found: warn

      - name: Upload test metrics JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-metrics-json
          path: reports/test-metrics.json
          if-no-files-found: warn

      - name: Upload metrics HTML dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-dashboard
          path: reports/metrics-dashboard/index.html
          if-no-files-found: warn

      - name: Upload test traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces
          path: test-results/
          if-no-files-found: warn
